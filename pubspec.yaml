name: local_llm_assistant
description: "Complete Offline Local LLM Assistant — Flutter + Llama.cpp (GGUF)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Core LLM engine ───────────────────────────────────────────────────────
  # flutter_llama wraps llama.cpp; supports Android, iOS, macOS
  # API: FlutterLlama.instance  ·  LlamaConfig  ·  GenerationParams
  flutter_llama: ^1.1.2

  # ── File Picker ───────────────────────────────────────────────────────────
  file_picker: ^8.0.0+1

  # ── State management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Storage & persistence ─────────────────────────────────────────────────
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4
  markdown: ^7.2.2
  cupertino_icons: ^1.0.8

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/models/
    - assets/animations/
    - assets/icons/
